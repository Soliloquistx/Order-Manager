<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>订单工作台</title>
  <link rel="stylesheet" href="/static/styles.css" />
</head>
<body>
  <div class="workspace-page">
    <section class="workspace-board card">
      <div class="board-topbar">
        <div class="board-title-block">
          <div class="board-title">订单工作台</div>
          <div class="board-subtitle">先看表，再决定是筛选、本地维护，还是去做 VBK 补抓</div>
        </div>
        <div class="board-topbar-actions">
          <button class="btn" onclick="exportOrders()">导出</button>
        </div>
      </div>

      <div class="workspace-filter-band">
        <div class="toolbar-band-label">筛选</div>
        <div class="filter-grid compact">
          <input id="filterKeyword" placeholder="搜索订单号 / 客户 / 产品" />
          <input id="filterChannel" placeholder="按渠道筛选" />
          <select id="filterOrderStatus"></select>
          <div class="inline-tools compact-actions left">
            <button class="btn primary" onclick="loadOrders()">筛选</button>
            <button class="btn" onclick="resetFilters()">重置</button>
          </div>
        </div>
      </div>

      <div class="workspace-toolbar-band workspace-toolbar-secondary compact-row">
        <div class="inline-tools fetch-bar">
          <input id="singleOrderLookup" type="text" class="toolbar-input narrow" placeholder="订单号" />
          <button class="btn primary" onclick="lookupSingleOrder()">查单</button>
          <span class="sep"></span>
          <input id="batchOrderNos" type="text" class="toolbar-input wide" placeholder="批量：一行一个 / 空格 / 逗号分隔" />
          <button class="btn primary" onclick="batchFetchOrders()">批量抓取</button>
          <button class="btn" onclick="clearBatchInput()">清空</button>
          <span class="sep"></span>
          <input id="vbkDepartureDate" type="date" class="toolbar-date" disabled />
          <select id="vbkListKind" class="toolbar-select" disabled>
            <option value="order">普通</option>
            <option value="hold">占位</option>
          </select>
          <button class="btn" onclick="importVbkByDate()">VBK导入</button>
        </div>
      </div>
      <div id="vbkImportResult" class="inline-result hidden"></div>

      <section class="table-shell">
        <div class="table-toolbar table-toolbar-main">
          <div>
            <div class="table-summary" id="tableSummary">正在加载...</div>
          </div>
        </div>
        <div class="table-wrap">
          <table class="workspace-table">
            <thead>
              <tr>
                <th class="col-check"><input type="checkbox" id="checkAllRows" onclick="toggleCheckAll(this.checked)" /></th>
                <th>订单号</th>
                <th>客户</th>
                <th>渠道</th>
                <th>产品/线路</th>
                <th>出发日期</th>
                <th>订单状态</th>
                <th>支付状态</th>
                <th>备注</th>
                <th>操作</th>
              </tr>
            </thead>
            <tbody id="orderTableBody"></tbody>
          </table>
          <div id="emptyState" class="empty" hidden>当前暂无订单数据</div>
        </div>
      </section>
    </section>
  </div>

  <div id="drawer" class="drawer hidden">
    <div class="drawer-panel">
      <div class="drawer-header">
        <div>
          <h2 id="drawerTitle">订单详情</h2>
          <p id="drawerSubtitle"></p>
        </div>
        <div class="actions">
          <button class="btn" id="editOrderBtn">编辑</button>
          <button class="btn" onclick="closeDrawer()">关闭</button>
        </div>
      </div>
      <div id="drawerContent" class="drawer-content"></div>
    </div>
  </div>

  <div id="orderModal" class="modal hidden">
    <div class="modal-panel large">
      <div class="modal-header">
        <h2 id="orderModalTitle">新增订单</h2>
        <button class="icon-btn" onclick="closeOrderModal()">×</button>
      </div>
      <form id="orderForm" class="form-grid" onsubmit="submitOrder(event)"></form>
    </div>
  </div>

  <div id="noteModal" class="modal hidden">
    <div class="modal-panel">
      <div class="modal-header">
        <h2>添加跟进记录</h2>
        <button class="icon-btn" onclick="closeNoteModal()">×</button>
      </div>
      <form id="noteForm" onsubmit="submitNote(event)">
        <div class="field"><label>记录类型</label><select name="note_type" id="note_type"></select></div>
        <div class="field"><label>记录内容</label><textarea name="content" id="note_content" rows="6" required></textarea></div>
        <div class="field"><label>下次跟进时间</label><input name="next_follow_up_at" id="note_next_follow_up_at" type="datetime-local" /></div>
        <div class="field"><label>同步修改跟进状态</label><select id="note_follow_status_after" name="follow_status_after"></select></div>
        <div class="form-actions"><button class="btn primary" type="submit">保存</button><button class="btn" type="button" onclick="closeNoteModal()">取消</button></div>
      </form>
    </div>
  </div>

  <div id="importModal" class="modal hidden">
    <div class="modal-panel">
      <div class="modal-header">
        <h2>导入订单（CSV）</h2>
        <button class="icon-btn" onclick="closeImportModal()">×</button>
      </div>
      <div class="field">
        <label>模板说明</label>
        <div class="tip-box">请使用 UTF-8 CSV。必填列：订单号、产品名称、客户姓名、渠道、出发日期、成人数、支付状态、订单状态、跟进状态。</div>
      </div>
      <form id="importForm" onsubmit="submitImport(event)">
        <div class="field"><label>选择 CSV 文件</label><input id="importFile" name="file" type="file" accept=".csv" required /></div>
        <div id="importResult" class="import-result hidden"></div>
        <div class="form-actions"><button class="btn primary" type="submit">开始导入</button><button class="btn" type="button" onclick="closeImportModal()">取消</button></div>
      </form>
    </div>
  </div>

  <div id="et818Modal" class="modal hidden">
    <div class="modal-panel">
      <div class="modal-header">
        <h2>→ ET818 录入</h2>
        <button class="icon-btn" onclick="closeEt818Modal()">×</button>
      </div>
      <div class="field">
        <label>按 ET818 录入顺序排列，复制后逐行粘贴</label>
        <textarea id="et818Text" rows="12" readonly style="font-family:monospace;font-size:13px"></textarea>
      </div>
      <div class="form-actions">
        <button class="btn primary" onclick="copyEt818Text()">复制到剪贴板</button>
        <button class="btn" onclick="closeEt818Modal()">关闭</button>
      </div>
    </div>
  </div>

  <style>
    .compact-kv { display:grid; grid-template-columns:repeat(2,minmax(0,1fr)); gap:6px 16px; margin:8px 0 10px; font-size:13px; }
    .mini-section-title { margin:10px 0 6px; font-size:12px; color:#666; font-weight:700; }
    .compact-step-list { list-style:none; padding:0; margin:0; display:grid; gap:6px; }
    .compact-step-list li { display:flex; align-items:flex-start; gap:8px; font-size:13px; line-height:1.45; }
    .compact-step-list li strong { min-width:78px; }
    .status-chip { display:inline-flex; align-items:center; justify-content:center; width:18px; height:18px; border-radius:999px; font-size:12px; font-weight:700; flex:0 0 18px; }
    .status-chip.ok { background:#e8f7ee; color:#137a3d; }
    .status-chip.fail { background:#fdecec; color:#b42318; }
    .compact-error-box { margin-top:10px; padding:8px 10px; border-radius:8px; }
    .btn.is-loading { opacity:.75; cursor:wait; }
    .drawer-et818-result { margin:12px 0 0; }
    .danger-zone { margin-top:12px; padding-top:12px; border-top:1px dashed #e5e7eb; display:flex; gap:10px; align-items:center; flex-wrap:wrap; }
    .btn.danger { background:#b42318; color:#fff; border-color:#b42318; }
    .compact-table { width:100%; border-collapse:collapse; font-size:12px; margin-top:6px; }
    .compact-table th, .compact-table td { padding:4px 8px; border:1px solid #e5e7eb; text-align:left; white-space:nowrap; }
    .compact-table th { background:#f9fafb; font-weight:600; color:#666; }
    .compact-table td { color:#333; }
    .data-summary { margin-top:8px; }
  </style>

  <script>
    const STATUS_OPTIONS = {
      payment_status: ['', '未支付', '部分支付', '已支付', '已退款'],
      order_status: ['', '待确认', '已确认', '已出行', '已完成', '已取消', '已关闭'],
      follow_status: ['', '待跟进', '跟进中', '待客户反馈', '待内部处理', '已解决', '已搁置'],
      priority: ['低', '普通', '高', '紧急'],
      note_type: ['普通备注', '电话沟通', '微信沟通', '内部处理', '风险记录', '系统说明']
    };
    const CHANNEL_OPTIONS = ['', '携程', '微信', '抖音', '小红书', '老客转介绍', '其他'];
    let users = [];
    let currentOrderId = null;
    let editingOrderId = null;
    let currentRows = [];
    let drawerEt818Busy = false;
    let drawerEt818SubmitBusy = false;

    async function init() {
      users = await (await fetch('/api/users')).json();
      fillSelect('note_type', STATUS_OPTIONS.note_type, '记录类型');
      fillSelect('note_follow_status_after', STATUS_OPTIONS.follow_status, '不修改');
      fillSelect('filterOrderStatus', STATUS_OPTIONS.order_status, '全部状态');
      buildOrderForm();
      await loadOrders();
    }

    function fillSelect(selectId, options, placeholder) {
      const el = document.getElementById(selectId);
      if (!el) return;
      el.innerHTML = '';
      const first = document.createElement('option');
      first.value = '';
      first.textContent = placeholder;
      el.appendChild(first);
      options.filter(Boolean).forEach(v => {
        const opt = document.createElement('option');
        opt.value = v;
        opt.textContent = v;
        el.appendChild(opt);
      });
    }

    function collectFilters() {
      const params = new URLSearchParams();
      const mapping = {
        keyword: document.getElementById('filterKeyword').value.trim(),
        channel: document.getElementById('filterChannel').value.trim(),
        order_status: document.getElementById('filterOrderStatus').value.trim(),
      };
      Object.entries(mapping).forEach(([k, v]) => { if (v) params.set(k, v); });
      return params.toString();
    }

    async function loadOrders() {
      const qs = collectFilters();
      const resp = await fetch('/api/orders' + (qs ? `?${qs}` : ''));
      const data = await resp.json();
      currentRows = data.orders || [];
      renderTable(currentRows);
      document.getElementById('tableSummary').textContent = `共 ${currentRows.length} 条订单`; 
    }

    function renderTable(rows) {
      const body = document.getElementById('orderTableBody');
      const empty = document.getElementById('emptyState');
      body.innerHTML = '';
      document.getElementById('checkAllRows').checked = false;
      if (!rows.length) {
        empty.hidden = false;
        return;
      }
      empty.hidden = true;
      rows.forEach(row => {
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td class="col-check"><input type="checkbox" class="row-check" value="${row.id}" /></td>
          <td class="mono">${esc(row.order_no || '')}</td>
          <td>${esc(row.customer_name || '')}</td>
          <td>${esc(row.channel || '')}</td>
          <td><div class="product-title">${esc(row.product_name || row.route_name || '')}</div><div class="subline">${esc(row.source_platform || '')}</div></td>
          <td>${esc(row.departure_date || '')}</td>
          <td>${badge(row.order_status || '', 'amber')}</td>
          <td>${badge(row.payment_status || '', 'blue')}</td>
          <td>${renderEditableText(row, 'customer_note', row.customer_note || row.latest_note_summary || '', '点击填写备注', true)}</td>
          <td>
            <div class="row-actions">
              <button class="link-btn" onclick="openDrawer(${row.id})">详情</button>
              <button class="link-btn disabled" title="预览功能今晚未接通">预览</button>
              <button class="link-btn" onclick="refreshOne('${escAttr(row.order_no || '')}')">重抓</button>
            </div>
          </td>
        `;
        body.appendChild(tr);
      });
    }

    function renderEditableText(row, field, value, placeholder, multiline = false) {
      const cls = value ? 'editable-text filled' : 'editable-text empty';
      const display = value ? esc(value) : esc(placeholder);
      return `<div class="${cls} ${multiline ? 'multiline' : ''}" onclick="editInlineField(${row.id}, '${field}', ${JSON.stringify(value || '')}, ${JSON.stringify(placeholder)}, ${multiline})">${display}</div>`;
    }

    function editInlineField(orderId, field, currentValue, placeholder, multiline = false) {
      const target = event.currentTarget;
      const input = multiline ? document.createElement('textarea') : document.createElement('input');
      input.className = 'inline-editor';
      input.value = currentValue || '';
      input.placeholder = placeholder;
      if (multiline) input.rows = 3;
      const save = async () => {
        await saveWorkspaceField(orderId, field, input.value);
      };
      input.addEventListener('keydown', async (e) => {
        if (e.key === 'Escape') {
          await loadOrders();
        }
        if (!multiline && e.key === 'Enter') {
          e.preventDefault();
          await save();
        }
      });
      input.addEventListener('blur', save, { once: true });
      target.replaceWith(input);
      input.focus();
      input.select();
    }

    async function saveWorkspaceField(orderId, field, value) {
      const payload = { [field]: value };
      const resp = await fetch(`/api/orders/${orderId}/workspace-fields`, {
        method: 'PATCH',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify(payload)
      });
      if (!resp.ok) {
        const data = await resp.json().catch(() => ({}));
        alert(data.detail || '保存失败');
      }
      await loadOrders();
    }

    function parseBatchOrderNos() {
      const raw = (document.getElementById('batchOrderNos').value || '').trim();
      return raw.split(/[\s,，;；]+/).map(x => x.trim()).filter(Boolean);
    }

    async function batchFetchOrders() {
      const orderNos = parseBatchOrderNos();
      if (!orderNos.length) {
        setInlineResult('vbkImportResult', '请先输入订单号', 'error');
        return;
      }
      setInlineResult('vbkImportResult', `正在批量抓取 ${orderNos.length} 个订单，请稍候...`, 'ok');
      const resp = await fetch('/api/vbk/batch-find-by-order-nos', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ order_nos: orderNos, list_kind: 'auto', sync_if_missing: true })
      });
      const data = await resp.json();
      if (!resp.ok) {
        setInlineResult('vbkImportResult', `批量抓取失败：${esc(data.detail || '未知错误')}`, 'error');
        return;
      }
      const items = (data.items || []).map(item => `<li>${esc(item.order_no)} · ${esc(item.source || '')}${item.order ? ` · ${esc(item.order.customer_name || '')}` : ''}${item.detail ? ` · ${esc(item.detail)}` : ''}</li>`).join('');
      setInlineResult('vbkImportResult', `
        <div><strong>批量抓取完成</strong></div>
        <div>总数 ${data.total} ｜ 本地命中 ${data.local_hits} ｜ VBK补抓 ${data.vbk_hits} ｜ 未命中 ${data.misses} ｜ 错误 ${data.errors}</div>
        <ul>${items}</ul>
      `, 'ok');
      await loadOrders();
    }

    async function lookupSingleOrder() {
      const orderNo = (document.getElementById('singleOrderLookup').value || '').trim();
      if (!orderNo) {
        setInlineResult('vbkImportResult', '请输入订单号', 'error');
        return;
      }
      setInlineResult('vbkImportResult', `正在查单 ${orderNo}...`, 'ok');
      const resp = await fetch('/api/vbk/find-by-order-no', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ order_no: orderNo, list_kind: 'auto', sync_if_missing: true })
      });
      const data = await resp.json();
      if (!resp.ok) {
        setInlineResult('vbkImportResult', `查单失败：${esc(data.detail || '未知错误')}`, 'error');
        return;
      }
      const orderId = data.order?.id;
      if (!orderId) {
        setInlineResult('vbkImportResult', `查单成功但未找到本地订单记录`, 'error');
        return;
      }
      await loadOrders();
      await openDrawer(orderId);
      setInlineResult('vbkImportResult', `查单成功：${esc(orderNo)} → order #${orderId}`, 'ok');
    }

    async function refreshOne(orderNo) {
      document.getElementById('batchOrderNos').value = orderNo;
      await batchFetchOrders();
    }

    async function importVbkByDate() {
      setInlineResult('vbkImportResult', '按日期导入功能暂未接通。', 'error');
      return;
    }

    function clearBatchInput() {
      document.getElementById('batchOrderNos').value = '';
      document.getElementById('singleOrderLookup').value = '';
    }

    function renderNoSaveSummary(data, title = '一键 No-Save 已完成') {
      const validate = data.validate || {};
      const validateErrors = validate.errors || [];
      const steps = data.steps || [];
      const badge = (ok) => ok ? '<span class="status-chip ok">✓</span>' : '<span class="status-chip fail">✗</span>';
      const stepsHtml = steps.map(s => `<li>${badge(!!s.ok)}<strong>${esc(s.phase || '')}</strong><span>${esc(s.detail || '')}</span></li>`).join('');
      const checks = validate.required_main || [];
      const keyChecks = checks.filter(x => ['线路模板','大交通','团队类别','订单电话/姓名','订单号','参团人数','客人名单','接送信息'].includes(x.field));
      const checksHtml = keyChecks.map(c => `<li>${badge(!!c.ok)}${esc(c.field || '')}：${esc(c.actual || '')}</li>`).join('');
      return `
        <div class="test-summary-${validateErrors.length ? 'fail' : 'pass'}">${esc(title)}</div>
        <div class="compact-kv">
          <div>订单：<strong>${esc(data.order_no || '')}</strong></div>
          <div>Validate：<strong>${esc(validate.detail || '')}</strong></div>
          <div>客人：<strong>${esc(validate.traveller_count ?? 0)}</strong></div>
          <div>接送：<strong>${esc(validate.pickup_count ?? 0)}</strong></div>
        </div>
        <div class="mini-section-title">步骤摘要</div>
        <ul class="compact-step-list">${stepsHtml}</ul>
        <div class="mini-section-title">关键字段</div>
        <ul class="compact-step-list">${checksHtml}</ul>
        ${validateErrors.length ? `<div class="test-summary-fail compact-error-box">${esc(validateErrors.join('；'))}</div>` : ''}
      `;
    }

    function resetFilters() {
      document.getElementById('filterKeyword').value = '';
      document.getElementById('filterRouteName').value = '';
      document.getElementById('filterOwnerId').value = '';
      document.getElementById('filterChannel').value = '';
      document.getElementById('filterOrderStatus').value = '';
      loadOrders();
    }

    function toggleCheckAll(checked) {
      document.querySelectorAll('.row-check').forEach(el => { el.checked = checked; });
    }

    function setDrawerEt818Busy(busy) {
      drawerEt818Busy = busy;
      const btn = document.getElementById('drawerEt818WorkflowBtn');
      if (!btn) return;
      btn.disabled = !!busy;
      btn.textContent = busy ? 'ET818 工作流运行中…' : 'ET818 工作流';
      btn.classList.toggle('is-loading', !!busy);
    }

    async function runDrawerEt818Workflow(orderId, orderNo = '') {
      if (drawerEt818Busy) return null;
      setDrawerEt818Busy(true);
      try {
        return await runDrawerEt818NoSave(orderId, orderNo);
      } finally {
        setDrawerEt818Busy(false);
      }
    }

    async function runDrawerEt818NoSave(orderId, orderNo = '') {
      try {
        const syncResp = await fetch(`/api/orders/${orderId}/sync-vbk-detail-from-browser`, {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({ order_no: orderNo, list_kind: 'auto', sync_if_missing: true })
        });
        const syncData = await syncResp.json();
        if (!syncResp.ok) {
          alert(`VBK详情同步失败：${syncData.detail || '未知错误'}`);
          return null;
        }

        const payloadResp = await fetch(`/api/orders/${orderId}/et818-payload`);
        const payloadData = await payloadResp.json();
        if (!payloadResp.ok) {
          alert(`ET818 Payload 生成失败：${payloadData.detail || '未知错误'}`);
          return null;
        }

        const resp = await fetch(`/api/orders/${orderId}/et818-autofill/no-save`, { method: 'POST' });
        const data = await resp.json();
        if (!resp.ok) {
          alert(`一键 No-Save 失败：${data.detail || '未知错误'}`);
          return null;
        }
        const validate = data.validate || {};
        const resultHtml = `
          <div class="drawer-section">
            <div class="section-head"><h3>ET818 工作流结果</h3></div>
            <div class="tip-box ${validate.errors && validate.errors.length ? 'tip-error' : 'tip-success'}">
              ${renderNoSaveSummary(data, validate.errors && validate.errors.length ? 'ET818 工作流未完全通过' : 'ET818 工作流已通过')}
            </div>
          </div>
        `;
        await renderDrawer(orderId, resultHtml);
        return data;
      } catch (err) {
        alert(`一键 No-Save 异常：${err.message || err}`);
        return null;
      }
    }

    function setDrawerEt818SubmitBusy(busy) {
      drawerEt818SubmitBusy = busy;
      const btn = document.getElementById('drawerEt818SubmitBtn');
      if (!btn) return;
      btn.disabled = !!busy;
      btn.textContent = busy ? '提交中…' : '确认后提交到 ET818';
      btn.classList.toggle('is-loading', !!busy);
    }

    async function confirmDrawerEt818Submit(orderId) {
      if (drawerEt818SubmitBusy) return null;
      const ok = window.confirm('确认提交到 ET818 吗？这一步会点击保存，产生真实外部副作用。');
      if (!ok) return null;
      setDrawerEt818SubmitBusy(true);
      try {
        const resp = await fetch(`/api/orders/${orderId}/et818-autofill/submit`, { method: 'POST' });
        const data = await resp.json();
        if (!resp.ok) {
          alert(`ET818 提交失败：${data.detail || '未知错误'}`);
          return null;
        }
        const resultHtml = `
          <div class="drawer-section">
            <div class="section-head"><h3>ET818 提交结果</h3></div>
            <div class="tip-box tip-success">
              <div><strong>已触发真实提交</strong></div>
              <div>${esc(data.detail || '')}</div>
            </div>
          </div>
        `;
        await renderDrawer(orderId, resultHtml);
        return data;
      } catch (err) {
        alert(`ET818 提交异常：${err.message || err}`);
        return null;
      } finally {
        setDrawerEt818SubmitBusy(false);
      }
    }

    async function renderDrawer(orderId, resultHtml = '') {
      currentOrderId = orderId;
      const orderResp = await fetch(`/api/orders/${orderId}`);
      const data = await orderResp.json();
      const order = data.order || {};

      // 先拿 payload，看有没有详情数据
      let payloadResp = await fetch(`/api/orders/${orderId}/et818-payload`);
      let payloadData = await (payloadResp.ok ? payloadResp.json() : { et818_payload: {}, ok: false });
      let payload = payloadData.et818_payload || {};
      let travellers = (payload.travellers || []);
      let orderInfo = payload.order_info || {};

      // 没有详情数据且是 VBK 来源 → 自动同步
      if (!travellers.length && !orderInfo.adult_count && order.source_platform === 'VBK' && order.order_no) {
        const syncResp = await fetch(`/api/orders/${orderId}/sync-vbk-detail-from-browser`, {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({ order_no: order.order_no, list_kind: 'auto', sync_if_missing: true })
        });
        if (syncResp.ok) {
          await loadOrders();
          // 重新拿 payload
          payloadResp = await fetch(`/api/orders/${orderId}/et818-payload`);
          payloadData = await (payloadResp.ok ? payloadResp.json() : { et818_payload: {}, ok: false });
          payload = payloadData.et818_payload || {};
        }
      }

      const tmpl = payload.template_selection || {};
      orderInfo = payload.order_info || {};
      travellers = (payload.travellers || []);
      const pickup = (payload.pickup_dropoff || []);
      const room = orderInfo.room_need || {};
      const totalVbk = payloadData.total_amount_vbk || '';

      document.getElementById('drawerTitle').textContent = data.order.product_name || '订单详情';
      document.getElementById('drawerSubtitle').textContent = `订单号：${data.order.order_no}`;
      document.getElementById('editOrderBtn').onclick = () => openOrderModal(data.order);
      const notesHtml = data.notes.map(n => `
        <div class="timeline-item">
          <div class="timeline-meta">${esc(n.created_at)} · ${esc(n.created_by_name || '')} · ${esc(n.note_type)}</div>
          <div class="timeline-content">${esc(n.content)}</div>
        </div>
      `).join('') || '<div class="empty-inline">暂无备注</div>';
      const logsHtml = data.logs.slice(0,5).map(l => `<li>${esc(l.created_at)} · ${esc(l.description || l.action)}</li>`).join('') || '<li>暂无日志</li>';

      function travellerRow(t, i) {
        return `<tr><td>${i+1}</td><td>${esc(t.name||'')}</td><td>${esc(t.phone||'')}</td><td>${esc(t.id_type||'')}</td><td>${esc(t.id_no||'')}</td><td>${esc(t.gender||'')}</td><td>${esc(t.birth_date?.raw||'')}</td><td>${esc(t.person_type||'')}</td></tr>`;
      }
      function pickupRow(p, i) {
        return `<tr><td>${i+1}</td><td>${esc(p.date||'')}</td><td>${esc(p.flight||'')}</td><td>${esc(p.time||'')}</td><td>${esc(p.route||'')}</td><td>${esc(p.count||'')}人</td></tr>`;
      }

      const travellerTable = travellers.length
        ? `<table class="compact-table"><thead><tr><th>#</th><th>姓名</th><th>电话</th><th>证件类型</th><th>证件号</th><th>性别</th><th>出生日期</th><th>类型</th></tr></thead><tbody>${travellers.map(travellerRow).join('')}</tbody></table>`
        : '<div class="empty-inline">暂无客人数据</div>';

      const pickupTable = pickup.length
        ? `<table class="compact-table"><thead><tr><th>#</th><th>日期</th><th>航班</th><th>时间</th><th>路线</th><th>人数</th></tr></thead><tbody>${pickup.map(pickupRow).join('')}</tbody></table>`
        : '<div class="empty-inline">暂无接送数据</div>';

      const roomInfo = `标间${room.standard||0} / 大床${room.big_bed||0} / 三人间${room.triple||0} / 女单${room.single_female||0} / 男单${room.single_male||0}`;

      const templateConfirm = tmpl.needs_manual_confirm
        ? `<span style="color:#ff9800">需确认</span>`
        : `<span style="color:#4caf50">自动匹配</span>`;

      document.getElementById('drawerContent').innerHTML = `
        <div class="drawer-section"><h3>ET818 填表数据</h3>
          <div class="data-summary">
            <table class="compact-table">
              <tr><td style="width:100px;font-weight:600;color:#999">线路模板</td><td>${esc(tmpl.template_name || tmpl.template_keyword || '未匹配')} ${templateConfirm}</td></tr>
              <tr><td style="font-weight:600;color:#999">大交通</td><td>${esc(orderInfo.transport_name||'')}</td></tr>
              <tr><td style="font-weight:600;color:#999">团队类别</td><td>${esc(orderInfo.team_category||'')}</td></tr>
              <tr><td style="font-weight:600;color:#999">出行日期</td><td>${esc(orderInfo.departure_date?.raw||'')} → ${esc(orderInfo.return_date?.raw||'')}</td></tr>
              <tr><td style="font-weight:600;color:#999">人数</td><td>成人 ${orderInfo.adult_count||0} / 儿童 ${orderInfo.child_count||0}</td></tr>
              <tr><td style="font-weight:600;color:#999">用房</td><td>${roomInfo}</td></tr>
              <tr><td style="font-weight:600;color:#999">联系人</td><td>${esc(orderInfo.contact_name||'')} / ${esc(orderInfo.contact_phone||'')}</td></tr>
              <tr><td style="font-weight:600;color:#999">总计</td><td>${totalVbk ? esc(totalVbk)+' CNY' : '暂无'}</td></tr>
            </table>
          </div>
          <div style="margin-top:12px"><strong>客人名单</strong>（${travellers.length}人）</div>
          ${travellerTable}
          <div style="margin-top:12px"><strong>接送信息</strong>（${pickup.length}条）</div>
          ${pickupTable}
        </div>
        <div class="drawer-section">
          <div class="section-head"><h3>快捷操作</h3></div>
          <div class="et818-actions">
            <button class="btn primary" id="drawerEt818WorkflowBtn" onclick="runDrawerEt818Workflow(${data.order.id}, ${JSON.stringify(data.order.order_no || '')})">一键填表</button>
            <button class="btn" onclick="openCompare(${data.order.id})">对比</button>
            <button class="btn" onclick="openNoteModal(${data.order.id})">添加备注</button>
          </div>
          <div class="danger-zone" style="margin-top:8px">
            <span class="board-subtitle" style="font-size:12px;color:#999">验证通过后可真实提交到 ET818</span>
            <button class="btn danger" id="drawerEt818SubmitBtn" onclick="confirmDrawerEt818Submit(${data.order.id})">提交到 ET818</button>
          </div>
        </div>
        <div id="drawerEt818Result" class="drawer-et818-result">${resultHtml}</div>
        <div class="drawer-section"><h3>备注时间线</h3>${notesHtml}</div>
        <div class="drawer-section"><h3>最近日志</h3><ul class="log-list">${logsHtml}</ul></div>
      `;
      document.getElementById('drawer').classList.remove('hidden');
    }

    async function openDrawer(orderId) {
      await renderDrawer(orderId);
    }

    function openCompare(orderId) {
      window.open(`/compare/${orderId}`, '_blank');
    }

    function closeDrawer() { document.getElementById('drawer').classList.add('hidden'); }
    function openPreview(orderId) { window.open(`/orders/${orderId}/preview`, '_blank'); }

    function buildOrderForm(order = null) {
      editingOrderId = order ? order.id : null;
      document.getElementById('orderModalTitle').textContent = editingOrderId ? '编辑订单' : '新增订单';
      const form = document.getElementById('orderForm');
      const selectHtml = (name, options, value = '') => `<select name="${name}">${options.map(v => `<option value="${v}" ${String(v)===String(value)?'selected':''}>${v}</option>`).join('')}</select>`;
      form.innerHTML = `
        ${field('订单号', `<input name="order_no" required value="${escAttr(order?.order_no || '')}" />`)}
        ${field('外部单号', `<input name="external_order_no" value="${escAttr(order?.external_order_no || '')}" />`)}
        ${field('产品名称', `<input name="product_name" required value="${escAttr(order?.product_name || '')}" />`)}
        ${field('渠道', selectHtml('channel', CHANNEL_OPTIONS.filter(Boolean), order?.channel || '携程'))}
        ${field('来源平台', `<input name="source_platform" value="${escAttr(order?.source_platform || '')}" />`)}
        ${field('客户姓名', `<input name="customer_name" required value="${escAttr(order?.customer_name || '')}" />`)}
        ${field('客户手机号', `<input name="customer_phone" value="${escAttr(order?.customer_phone || '')}" />`)}
        ${field('备用联系方式', `<input name="backup_contact" value="${escAttr(order?.backup_contact || '')}" />`)}
        ${field('出发日期', `<input name="departure_date" type="date" required value="${escAttr(order?.departure_date || '')}" />`)}
        ${field('返程日期', `<input name="return_date" type="date" value="${escAttr(order?.return_date || '')}" />`)}
        ${field('成人数', `<input name="adult_count" type="number" min="1" value="${escAttr(order?.adult_count ?? 1)}" />`)}
        ${field('儿童数', `<input name="child_count" type="number" min="0" value="${escAttr(order?.child_count ?? 0)}" />`)}
        ${field('房间数', `<input name="room_count" type="number" min="0" value="${escAttr(order?.room_count ?? '')}" />`)}
        ${field('总金额', `<input name="total_amount" type="number" step="0.01" value="${escAttr(order?.total_amount ?? '')}" />`)}
        ${field('已付金额', `<input name="paid_amount" type="number" step="0.01" value="${escAttr(order?.paid_amount ?? 0)}" />`)}
        ${field('支付状态', selectHtml('payment_status', STATUS_OPTIONS.payment_status.filter(Boolean), order?.payment_status || '未支付'))}
        ${field('订单状态', selectHtml('order_status', STATUS_OPTIONS.order_status.filter(Boolean), order?.order_status || '待确认'))}
        ${field('跟进状态', selectHtml('follow_status', STATUS_OPTIONS.follow_status.filter(Boolean), order?.follow_status || '待跟进'))}
        ${field('优先级', selectHtml('priority', STATUS_OPTIONS.priority, order?.priority || '普通'))}
        ${field('下次跟进时间', `<input name="next_follow_up_at" type="datetime-local" value="${toDatetimeLocal(order?.next_follow_up_at || '')}" />`)}
        <div class="field span-2"><label>客户备注</label><textarea name="customer_note" rows="3">${esc(order?.customer_note || '')}</textarea></div>
        <div class="field span-2"><label>初始备注</label><textarea name="initial_note" rows="4"></textarea></div>
        <div class="form-actions span-2"><button class="btn primary" type="submit">保存</button><button class="btn" type="button" onclick="closeOrderModal()">取消</button></div>
      `;
    }

    function field(label, control) { return `<div class="field"><label>${label}</label>${control}</div>`; }
    function openOrderModal(order = null) { buildOrderForm(order); document.getElementById('orderModal').classList.remove('hidden'); }
    function closeOrderModal() { document.getElementById('orderModal').classList.add('hidden'); }
    function openNoteModal(orderId) { currentOrderId = orderId; document.getElementById('noteForm').reset(); document.getElementById('noteModal').classList.remove('hidden'); }
    function closeNoteModal() { document.getElementById('noteModal').classList.add('hidden'); }
    function openImportModal() {
      document.getElementById('importForm').reset();
      document.getElementById('importResult').classList.add('hidden');
      document.getElementById('importResult').innerHTML = '';
      document.getElementById('importModal').classList.remove('hidden');
    }
    function closeImportModal() { document.getElementById('importModal').classList.add('hidden'); }

    async function submitOrder(event) {
      event.preventDefault();
      const formData = new FormData(event.target);
      const payload = Object.fromEntries(formData.entries());
      ['adult_count','child_count','room_count'].forEach(k => { if (payload[k] !== '') payload[k] = Number(payload[k]); });
      ['total_amount','paid_amount'].forEach(k => { if (payload[k] !== '') payload[k] = Number(payload[k]); else payload[k] = null; });
      const method = editingOrderId ? 'PUT' : 'POST';
      const url = editingOrderId ? `/api/orders/${editingOrderId}` : '/api/orders';
      const resp = await fetch(url, { method, headers: {'Content-Type': 'application/json'}, body: JSON.stringify(payload) });
      if (!resp.ok) { alert((await resp.json()).detail || '保存失败'); return; }
      closeOrderModal();
      await loadOrders();
      if (editingOrderId) await openDrawer(editingOrderId);
    }

    async function submitNote(event) {
      event.preventDefault();
      const payload = Object.fromEntries(new FormData(event.target).entries());
      const resp = await fetch(`/api/orders/${currentOrderId}/notes`, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(payload) });
      if (!resp.ok) { alert('备注保存失败'); return; }
      closeNoteModal();
      await loadOrders();
      if (currentOrderId) await openDrawer(currentOrderId);
    }

    async function submitImport(event) {
      event.preventDefault();
      const formData = new FormData();
      const fileInput = document.getElementById('importFile');
      if (!fileInput.files.length) {
        alert('请选择 CSV 文件');
        return;
      }
      formData.append('file', fileInput.files[0]);
      const resp = await fetch('/api/orders/import', { method: 'POST', body: formData });
      const resultBox = document.getElementById('importResult');
      const data = await resp.json();
      if (!resp.ok) {
        resultBox.classList.remove('hidden');
        resultBox.innerHTML = `<div class="result-error">导入失败：${esc(data.detail || '未知错误')}</div>`;
        return;
      }
      resultBox.classList.remove('hidden');
      resultBox.innerHTML = `<div class="result-ok">成功 ${data.success} 条，失败 ${(data.failed || []).length} 条，总计 ${data.total} 条</div>`;
      await loadOrders();
    }

    function setInlineResult(targetId, html, tone = 'ok') {
      const box = document.getElementById(targetId);
      box.className = `inline-result ${tone}`;
      box.innerHTML = html;
      box.classList.remove('hidden');
    }

    function exportOrders() {
      const qs = collectFilters();
      window.open('/api/orders/export' + (qs ? `?${qs}` : ''), '_blank');
    }

    function badge(text, tone) { return `<span class="badge ${tone}">${esc(text || '')}</span>`; }
    function money(v) { return v === null || v === undefined || v === '' ? '' : '¥' + Number(v).toFixed(2); }
    function esc(text) { return String(text ?? '').replace(/[&<>"']/g, s => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[s])); }
    function escAttr(text) { return esc(text); }
    function toDatetimeLocal(v) { return v ? String(v).replace(' ', 'T').slice(0,16) : ''; }

    async function openEt818Export(orderId) {
      const resp = await fetch(`/api/orders/${orderId}/et818-format`);
      const data = await resp.json();
      if (!resp.ok) { alert(data.detail || '获取失败'); return; }
      document.getElementById('et818Text').value = data.text;
      document.getElementById('et818Modal').classList.remove('hidden');
    }

    function closeEt818Modal() {
      document.getElementById('et818Modal').classList.add('hidden');
    }

    function copyEt818Text() {
      const ta = document.getElementById('et818Text');
      ta.select();
      document.execCommand('copy');
      alert('已复制到剪贴板，可在 ET818 新增表单中逐行粘贴');
    }

    init();
  </script>
</body>
</html>
